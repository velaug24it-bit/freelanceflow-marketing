<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <style>
      .bg { fill: #0f172a; }
      .title { font-family: Inter, Arial, sans-serif; font-size:72px; font-weight:700; fill: url(#g); }
      .sub { font-family: Inter, Arial, sans-serif; font-size:28px; fill:#94A3B8; }
